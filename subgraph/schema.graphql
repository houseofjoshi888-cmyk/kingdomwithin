type Mandala @entity {
  id: ID! # Token ID
  contentHash: Bytes!
  protocolVersion: String!
  metadataURI: String!
  epochId: BigInt!
  minter: Bytes!
  recipient: Bytes!
  price: BigInt!
  timestamp: BigInt!
}

type EpochStats @entity {
  id: ID! # Epoch ID
  totalMinted: BigInt!
  totalVolume: BigInt!
}
