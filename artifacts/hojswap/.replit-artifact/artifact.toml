kind = "web"
previewPath = "/"
title = "HojSwap"
version = "1.0.0"
id = "artifacts/hojswap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25051

[services.development]
run = "pnpm --filter @workspace/hojswap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hojswap", "run", "build" ]
publicDir = "artifacts/hojswap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25051"
BASE_PATH = "/"
